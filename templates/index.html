<!DOCTYPE html>
<html>
<head>
    <title>AI Phishing URL Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 22px; }
        input { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .safe { background: #e6f4ea; border: 1px solid #34a853; }
        .phishing { background: #fce8e6; border: 1px solid #ea4335; }
        ul { margin: 8px 0; padding-left: 20px; }
    </style>
</head>
<body>
    <h1>🔍 AI Phishing URL Detector</h1>
    <input type="text" id="urlInput" placeholder="Paste a URL to check, e.g. https://example.com/login">
    <button onclick="checkURL()">Check URL</button>
    <div id="result"></div>

    <script>
        async function checkURL() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            if (!url) return;

            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = 'Checking...';

            const res = await fetch('/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();

            resultDiv.className = data.is_phishing ? 'phishing' : 'safe';
            resultDiv.innerHTML = `
                <strong>${data.is_phishing ? '⚠️ Likely Phishing' : '✅ Likely Safe'}</strong>
                (${data.confidence}% confidence)
                <p>Reasons:</p>
                <ul>${data.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
            `;
        }
    </script>
</body>
</html>
